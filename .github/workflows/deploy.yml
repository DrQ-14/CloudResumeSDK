name: Deploy to Azure Static Web App

on:
  push:
    branches:
      - main

jobs:
  terraform:
    name: "Terraform Infrastructure"
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read
    
    env:
      TF_VAR_project_name: ${{ secrets.PROJECT_NAME }}
      TF_VAR_environment: ${{ secrets.ENVIRONMENT }}
      TF_VAR_location: ${{ secrets.LOCATION }}

    defaults:
      run:
        working-directory: ./infra
        
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: TF_LOG=INFO terraform plan -input=false
        
      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false
        if: github.ref == 'refs/heads/main'
        
  deploy_frontend:
    needs: terraform
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Azure
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.FRONTEND_DEPLOYMENT_TOKEN }}
          action: "upload"
          app_location: "frontend"
          output_location: "frontend"

  build_and_deploy_function:
    needs: terraform
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    permissions:
      id-token: write
      contents: read

    env:
      AZURE_FUNCTIONAPP_NAME: resume-dev-function
      AZURE_RESOURCE_GROUP: resume-dev-rg
      STORAGE: resumedevfuncstor
      AZURE_FUNCTIONAPP_PACKAGE_PATH: 'backend/ResumeCounter.Functions'
      DOTNET_VERSION: '8.0.x'


    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore dependencies
      run: |
        dotnet restore ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}/ResumeCounter.Functions.csproj

    - name: Publish Function App
      run: |
        dotnet publish ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}/ResumeCounter.Functions.csproj \
          -c Release \
          -o publish_output

    - name: Inspect publish output
      run: |
        ls -R publish_output

    - name: Validate Function App structure
      run: |
        cat publish_output/host.json

    - name: Azure Login (OIDC)
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Zip Function App
      run: |
        cd publish_output
        zip -r ../functionapp.zip .
  
    - name: Upload package to blob
      run: |
        az storage blob upload \
          --auth-mode login \
          --account-name $STORAGE \
          --container-name function-releases \
          --name functionapp.zip \
          --file functionapp.zip
    
    - name: Generate SAS + deploy
      run: |
        SAS=$(az storage blob generate-sas \
          --auth-mode login \
          --account-name $STORAGE \
          --container-name function-releases \
          --name functionapp.zip \
          --permissions r \
          --expiry 2027-01-01T00:00Z \
          --output tsv)
    
        URL="https://${STORAGE}.blob.core.windows.net/function-releases/functionapp.zip?$SAS"
    
        az functionapp config appsettings set \
          --name $FUNCTION \
          --resource-group $RG \
          --settings WEBSITE_RUN_FROM_PACKAGE="$URL"