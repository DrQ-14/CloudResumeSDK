name: Deploy to Azure Static Web App

on:
  push:
    branches:
      - main

jobs:
  terraform:
    name: "Terraform Infrastructure"
    runs-on: ubuntu-latest
    
    outputs:
      function_app_name: ${{ steps.tf_outputs.outputs.function_app_name }}
      resource_group_name: ${{ steps.tf_outputs.outputs.resource_group_name }}

    permissions:
      id-token: write
      contents: read
    
    env:
      TF_VAR_project_name: ${{ secrets.PROJECT_NAME }}
      TF_VAR_environment: ${{ secrets.ENVIRONMENT }}
      TF_VAR_location: ${{ secrets.LOCATION }}

    defaults:
      run:
        working-directory: ./infra
        
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: TF_LOG=INFO terraform plan -input=false
        
      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false
        if: github.ref == 'refs/heads/main'
    
      - name: Get Terraform Outputs
        id: tf_outputs
        if: github.ref == 'refs/heads/main'
        working-directory: ./infra
        run: |
          FUNCTION_APP_NAME=$(terraform output -raw function_app_name | tr -d '\r\n[:space:]')
          RESOURCE_GROUP=$(terraform output -raw resource_group_name | tr -d '\r\n[:space:]')
          echo "function_app_name=$FUNCTION_APP_NAME" >> $GITHUB_OUTPUT
          echo "resource_group_name=$RESOURCE_GROUP" >> $GITHUB_OUTPUT
      
      - name: Debug Terraform Outputs
        if: github.ref == 'refs/heads/main'
        run: |
          echo "TF function_app_name:"
          terraform output function_app_name
          echo "TF resource_group_name:"
          terraform output resource_group_name

          echo "RAW function_app_name='$(terraform output -raw function_app_name | cat -A)'"
          echo "RAW resource_group_name='$(terraform output -raw resource_group_name | cat -A)'"
        
  deploy_frontend:
    needs: terraform
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Azure
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.FRONTEND_DEPLOYMENT_TOKEN }}
          action: "upload"
          app_location: "frontend"
          output_location: "frontend"

  build_and_deploy_function:
    needs: terraform
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    env:
      AZURE_FUNCTIONAPP_NAME: ${{ needs.terraform.outputs.function_app_name }}
      AZURE_RESOURCE_GROUP: ${{ needs.terraform.outputs.resource_group_name }}
      AZURE_FUNCTIONAPP_PACKAGE_PATH: 'backend/ResumeCounter.Functions'
      DOTNET_VERSION: '8.0.x'


    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore dependencies
      run: |
        dotnet restore ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}/ResumeCounter.Functions.csproj

    - name: Publish Function App
      run: |
        dotnet publish ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}/ResumeCounter.Functions.csproj \
          -c Release \
          -o publish_output

    - name: Inspect publish output
      run: |
        ls -R publish_output

    - name: Validate Function App structure
      run: |
        cat publish_output/host.json

    - name: Azure Login (OIDC)
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Zip Function App
      run: |
        cd publish_output
        zip -r ../functionapp.zip .

    - name: Debug values
      run: |
        echo "Function App Name: $AZURE_FUNCTIONAPP_NAME"
        echo "Resource Group: $AZURE_RESOURCE_GROUP"
  
    - name: Deploy via Azure CLI
      run: |
        az functionapp deployment source config-zip \
          --name $AZURE_FUNCTIONAPP_NAME \
          --resource-group $AZURE_RESOURCE_GROUP \
          --src functionapp.zip