name: Deploy to Azure Static Web App

on:
  push:
    branches:
      - main

jobs:
  terraform:
    name: "Terraform Infrastructure"
    runs-on: ubuntu-latest
    outputs:
      function_app_name: ${{ steps.tf_outputs.outputs.function_app_name }}
      resource_group: ${{ steps.tf_outputs.outputs.resource_group }}
      storage: ${{ steps.tf_outputs.outputs.storage }}
      cosmos_endpoint: ${{ steps.tf_outputs.outputs.cosmos_endpoint }}

    permissions:
      id-token: write
      contents: read
    
    env:
      TF_VAR_project_name: ${{ secrets.PROJECT_NAME }}
      TF_VAR_environment: ${{ secrets.ENVIRONMENT }}
      TF_VAR_location: ${{ secrets.LOCATION }}

    defaults:
      run:
        working-directory: ./infra
        
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -input=false

      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false
        if: github.ref == 'refs/heads/main'

      - name: Capture Terraform Outputs
        id: tf_outputs
        run: |
          #Function App Name
          echo "function_app_name=$(terraform output -raw function_app_name)" >> $GITHUB_OUTPUT

          #Resource Group
          echo "resource_group=$(terraform output -raw resource_group_name)" >> $GITHUB_OUTPUT

          #Storage Account Name
          echo "storage=$(terraform output -raw storage_account_name)" >> $GITHUB_OUTPUT

          #Cosmos Endpoint
          echo "cosmos_endpoint=$(terraform output -raw cosmos_endpoint)" >> $GITHUB_OUTPUT

  test:
    name: "Run .NET Tests"
    needs: terraform
    runs-on: ubuntu-latest

    env:
      COSMOS_ENDPOINT: ${{ needs.terraform.outputs.cosmos_endpoint }}


    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Restore Function App
        run: dotnet restore backend/ResumeCounter.Functions/ResumeCounter.Functions.csproj

      - name: Restore Unit Tests
        run: dotnet restore backend/ResumeCounter.Tests.Unit/ResumeCounter.Tests.Unit.csproj

      - name: Restore Integration Tests
        run: dotnet restore backend/ResumeCounter.Tests.Integration/ResumeCounter.Tests.Integration.csproj

      - name: Build Function App
        run: dotnet build backend/ResumeCounter.Functions/ResumeCounter.Functions.csproj --configuration Release --no-restore

      - name: Run Unit Tests
        run: dotnet test backend/ResumeCounter.Tests.Unit/ResumeCounter.Tests.Unit.csproj --configuration Release --logger trx --results-directory TestResults/Unit

      - name: Run Integration Tests
        run: dotnet test backend/ResumeCounter.Tests.Integration/ResumeCounter.Tests.Integration.csproj --configuration Release --logger trx --results-directory TestResults/Integration

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults

      - name: Publish test report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: .NET Tests
          path: TestResults/*.trx
          reporter: dotnet-trx

  deploy_frontend:
    needs: [terraform, test]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Azure
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.FRONTEND_DEPLOYMENT_TOKEN }}
          action: "upload"
          app_location: "frontend"
          output_location: "frontend"

  build_and_deploy_function:
    needs: [terraform, test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    permissions:
      id-token: write
      contents: read

    env:
      AZURE_FUNCTIONAPP_NAME: ${{ needs.terraform.outputs.function_app_name }}
      AZURE_RESOURCE_GROUP: ${{ needs.terraform.outputs.resource_group }}
      STORAGE: ${{ needs.terraform.outputs.storage }}
      AZURE_FUNCTIONAPP_PACKAGE_PATH: 'backend/ResumeCounter.Functions'
      DOTNET_VERSION: '8.0.x'

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: 'Resolve Project Dependencies Using Dotnet'
      shell: bash
      run: |
        pushd './${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}'
        dotnet publish --configuration Release --output ./output --self-contained false
        popd

    - name: Deploy to Azure Functions
      uses: Azure/functions-action@v1
      with:
        app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
        package: '${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}/output'
        publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}